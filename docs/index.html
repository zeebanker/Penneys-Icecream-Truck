<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>A Whale of a Treat!</title>
<link rel="manifest" href="/manifest.webmanifest" />
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
<link rel="apple-touch-icon" href="/apple-touch-icon.png" />
<meta name="apple-mobile-web-app-title" content="Penny" />
<meta name="application-name" content="Penny" />
<meta name="theme-color" content="#3E82C6" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<style>
  :root {
    --sky: #E9F3FC;
    --whale: #3E82C6;
    --whale-dark: #295F97;
    --ink: #21406A;
    --green: #1E9E76;
    --slate: #5A7392;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; height: 100%; }
  body { font-family: 'Fredoka', system-ui, sans-serif; color: var(--ink); }
  #map { position: absolute; inset: 0; z-index: 1; background: var(--sky); }

  .topbar {
    position: absolute; top: 0; left: 0; right: 0; z-index: 500;
    background: #FFFFFF;
    border-bottom: 3px solid #D8EAFB;
    box-shadow: 0 4px 14px rgba(41,95,151,0.14);
    padding: 8px 16px 9px;
    text-align: center;
  }
  .topbar .logo { height: 52px; width: auto; display: block; margin: 0 auto; }
  .topbar .status { font-size: 13.5px; font-weight: 500; margin-top: 3px; min-height: 18px; }
  .topbar .status.on  { color: var(--green); }
  .topbar .status.off { color: var(--slate); }

  .curtain {
    position: absolute; inset: 0; z-index: 800;
    display: none;
    align-items: center; justify-content: center;
    padding: 24px;
    background: rgba(233,243,252,0.88);
    backdrop-filter: blur(2px);
  }
  .curtain.show { display: flex; }
  .curtain .msg {
    background: #FFF2F6;
    border: 3px solid #FFC7D9;
    border-radius: 26px;
    box-shadow: 0 12px 30px rgba(226,62,117,0.18);
    padding: 26px 26px 30px;
    text-align: center;
    max-width: 340px;
  }
  .curtain .whale-img { width: 120px; height: auto; display: block; margin: 0 auto 6px; }
  .curtain h1 { font-size: 22px; font-weight: 700; margin: 8px 0 6px; }
  .curtain p { font-size: 15px; font-weight: 500; color: var(--slate); margin: 0; }

  .tk { display: flex; flex-direction: column; align-items: center; }
  .tk-pill {
    background: var(--whale); color: #fff;
    font-weight: 600; font-size: 12.5px; white-space: nowrap;
    padding: 3px 12px; border-radius: 20px; margin-bottom: 2px;
    box-shadow: 0 4px 10px rgba(41,95,151,.34);
  }
  .tk-whale {
    width: 52px; height: auto; display: block;
    filter: drop-shadow(0 5px 5px rgba(41,95,151,.35));
  }
  .tk.serving { animation: bounce 1.1s ease-in-out infinite; }
  .tk.moving  { animation: nudge 0.9s ease-in-out infinite; }
  @keyframes bounce {
    0%, 100% { transform: translateY(0); }
    50%      { transform: translateY(-9px); }
  }
  @keyframes nudge {
    0%, 100% { transform: translateX(-4px); }
    50%      { transform: translateX(5px); }
  }

  .leaflet-container { font-family: 'Fredoka', sans-serif; }
</style>
</head>
<body>
  <div id="map"></div>

  <div class="topbar">
    <img class="logo" src="whale-logo.png" alt="A Whale of a Treat!" />
    <div class="status off" id="status">Looking for Penny&hellip;</div>
  </div>

  <div class="curtain" id="curtain">
    <div class="msg">
      <img class="whale-img" src="whale-pin.png" alt="" />
      <h1 id="curtainTitle">Penny isn't out right now</h1>
      <p id="curtainText">Check back later to see where Penny is on the map</p>
    </div>
  </div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
  var API = "https://penneys-truck.zeebanker.workers.dev";
  var TWIN_CITIES = [44.9537, -93.13];

  var map = L.map("map", { zoomControl: true, attributionControl: true })
             .setView(TWIN_CITIES, 12);
  L.tileLayer("https://tile.openstreetmap.org/{z}/{x}/{y}.png", {
    maxZoom: 19,
    attribution: '&copy; OpenStreetMap'
  }).addTo(map);

  var marker = null;
  var hasCentered = false;

  function truckIcon(moving) {
    var cls = moving ? "tk moving" : "tk serving";
    return L.divIcon({
      className: "tk-wrap",
      html: '<div class="' + cls + '"><div class="tk-pill">Penny!</div><img class="tk-whale" src="whale-pin.png" alt="Penny" style="width:52px;height:auto;"></div>',
      iconSize: [90, 98],
      iconAnchor: [45, 94]
    });
  }

  function ago(iso) {
    var then = new Date(iso).getTime();
    var secs = Math.max(0, Math.round((Date.now() - then) / 1000));
    if (secs < 60) return "just now";
    var mins = Math.round(secs / 60);
    if (mins === 1) return "1 minute ago";
    if (mins < 60) return mins + " minutes ago";
    var hrs = Math.round(mins / 60);
    return hrs === 1 ? "1 hour ago" : hrs + " hours ago";
  }

  function setStatus(text, on) {
    var s = document.getElementById("status");
    s.textContent = text;
    s.className = "status " + (on ? "on" : "off");
  }

  function showCurtain(show, title, text) {
    var c = document.getElementById("curtain");
    if (title) document.getElementById("curtainTitle").textContent = title;
    if (text) document.getElementById("curtainText").textContent = text;
    c.className = "curtain" + (show ? " show" : "");
  }

  function clearMarker() {
    if (marker) { map.removeLayer(marker); marker = null; }
  }

  async function refresh() {
    var d;
    try {
      var r = await fetch(API + "/state", { cache: "no-store" });
      d = await r.json();
    } catch (e) {
      setStatus("Can't reach the map right now", false);
      return;
    }

    if (d.sharing !== 1) {
      clearMarker();
      setStatus("Penny isn't out right now", false);
      showCurtain(true, "Penny isn't out right now", "Check back later to see where Penny is on the map");
      return;
    }

    if (d.lat == null || d.lon == null) {
      clearMarker();
      setStatus("Penny is getting ready…", true);
      showCurtain(true, "Penny is on her way!", "Her spot on the map will appear any minute.");
      return;
    }

    showCurtain(false);
    var pos = [d.lat, d.lon];
    var icon = truckIcon(d.moving === 1);
    if (!marker) {
      marker = L.marker(pos, { icon: icon }).addTo(map);
    } else {
      marker.setLatLng(pos);
      marker.setIcon(icon);
    }
    if (!hasCentered) { map.setView(pos, 15); hasCentered = true; }

    var when = d.updated_at ? ago(d.updated_at) : "";
    var verb = d.moving === 1 ? "on the move" : "serving now";
    setStatus("Penny is out, " + verb + (when ? " · updated " + when : ""), true);
  }

  refresh();
  setInterval(refresh, 30000);
</script>
</body>
</html>
