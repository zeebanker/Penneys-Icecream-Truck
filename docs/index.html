<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>Penny's Truck</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<style>
  :root {
    --cream: #FFF3E0;
    --pink: #FF7AA2;
    --pink-dark: #E23E75;
    --mint: #3FC79A;
    --mint-dark: #1E9E76;
    --brown: #6B4226;
    --sun: #FFC94D;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; height: 100%; }
  body { font-family: 'Fredoka', system-ui, sans-serif; color: var(--brown); }
  #map { position: absolute; inset: 0; z-index: 1; background: var(--cream); }

  .topbar {
    position: absolute; top: 0; left: 0; right: 0; z-index: 500;
    background: #FFFDF9;
    border-bottom: 3px solid #fff;
    box-shadow: 0 4px 14px rgba(107,66,38,0.12);
    padding: 12px 16px 12px;
    text-align: center;
  }
  .topbar .brand { font-weight: 700; font-size: 21px; }
  .topbar .brand .cone { font-size: 23px; }
  .topbar .status { font-size: 13.5px; font-weight: 500; margin-top: 2px; min-height: 18px; }
  .topbar .status.on  { color: var(--mint-dark); }
  .topbar .status.off { color: var(--pink-dark); }

  .curtain {
    position: absolute; inset: 0; z-index: 800;
    display: none;
    align-items: center; justify-content: center;
    padding: 24px;
    background: rgba(255,243,224,0.86);
    backdrop-filter: blur(2px);
  }
  .curtain.show { display: flex; }
  .curtain .msg {
    background: #FFFDF9;
    border: 3px solid #fff;
    border-radius: 26px;
    box-shadow: 0 12px 30px rgba(107,66,38,0.16);
    padding: 30px 26px;
    text-align: center;
    max-width: 340px;
  }
  .curtain .big-emoji { font-size: 58px; line-height: 1; }
  .curtain h1 { font-size: 22px; font-weight: 700; margin: 14px 0 6px; }
  .curtain p { font-size: 15px; font-weight: 500; color: #A9825F; margin: 0; }

  .tk { display: flex; flex-direction: column; align-items: center; }
  .tk-pill {
    background: var(--pink); color: #fff;
    font-weight: 600; font-size: 12.5px; white-space: nowrap;
    padding: 3px 12px; border-radius: 20px; margin-bottom: 4px;
    box-shadow: 0 4px 10px rgba(226,62,117,.32);
  }
  .tk-pin {
    width: 50px; height: 50px;
    background: var(--pink); border: 3px solid #fff;
    border-radius: 50% 50% 50% 0; transform: rotate(-45deg);
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 7px 14px rgba(107,66,38,.3);
  }
  .tk-pin span { transform: rotate(45deg); font-size: 23px; line-height: 1; }
  .tk.serving { animation: bounce 1.1s ease-in-out infinite; }
  .tk.moving  { animation: nudge 0.9s ease-in-out infinite; }
  @keyframes bounce {
    0%, 100% { transform: translateY(0); }
    50%      { transform: translateY(-9px); }
  }
  @keyframes nudge {
    0%, 100% { transform: translateX(-4px); }
    50%      { transform: translateX(5px); }
  }

  .leaflet-container { font-family: 'Fredoka', sans-serif; }
</style>
</head>
<body>
  <div id="map"></div>

  <div class="topbar">
    <div class="brand"><span class="cone">🍦</span> Penny's Truck</div>
    <div class="status off" id="status">Looking for Penny&hellip;</div>
  </div>

  <div class="curtain" id="curtain">
    <div class="msg">
      <div class="big-emoji">🍦</div>
      <h1 id="curtainTitle">Penny isn't out right now</h1>
      <p id="curtainText">Check back later to see where Penny is on the map</p>
    </div>
  </div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
  var API = "https://penneys-truck.zeebanker.workers.dev";
  var TWIN_CITIES = [44.9537, -93.13];

  var map = L.map("map", { zoomControl: true, attributionControl: true })
             .setView(TWIN_CITIES, 12);
  L.tileLayer("https://tile.openstreetmap.org/{z}/{x}/{y}.png", {
    maxZoom: 19,
    attribution: '&copy; OpenStreetMap'
  }).addTo(map);

  var marker = null;
  var hasCentered = false;

  function truckIcon(moving) {
    var cls = moving ? "tk moving" : "tk serving";
    return L.divIcon({
      className: "tk-wrap",
      html: '<div class="' + cls + '"><div class="tk-pill">Penny!</div><div class="tk-pin"><span>🍦</span></div></div>',
      iconSize: [80, 82],
      iconAnchor: [40, 78]
    });
  }

  function ago(iso) {
    var then = new Date(iso).getTime();
    var secs = Math.max(0, Math.round((Date.now() - then) / 1000));
    if (secs < 60) return "just now";
    var mins = Math.round(secs / 60);
    if (mins === 1) return "1 minute ago";
    if (mins < 60) return mins + " minutes ago";
    var hrs = Math.round(mins / 60);
    return hrs === 1 ? "1 hour ago" : hrs + " hours ago";
  }

  function setStatus(text, on) {
    var s = document.getElementById("status");
    s.textContent = text;
    s.className = "status " + (on ? "on" : "off");
  }

  function showCurtain(show, title, text) {
    var c = document.getElementById("curtain");
    if (title) document.getElementById("curtainTitle").textContent = title;
    if (text) document.getElementById("curtainText").textContent = text;
    c.className = "curtain" + (show ? " show" : "");
  }

  function clearMarker() {
    if (marker) { map.removeLayer(marker); marker = null; }
  }

  async function refresh() {
    var d;
    try {
      var r = await fetch(API + "/state", { cache: "no-store" });
      d = await r.json();
    } catch (e) {
      setStatus("Can't reach the map right now", false);
      return;
    }

    if (d.sharing !== 1) {
      clearMarker();
      setStatus("Penny isn't out right now", false);
      showCurtain(true, "Penny isn't out right now", "Check back later to see where Penny is on the map");
      return;
    }

    if (d.lat == null || d.lon == null) {
      clearMarker();
      setStatus("Penny is getting ready…", true);
      showCurtain(true, "Penny is on her way!", "Her spot on the map will appear any minute.");
      return;
    }

    showCurtain(false);
    var pos = [d.lat, d.lon];
    var icon = truckIcon(d.moving === 1);
    if (!marker) {
      marker = L.marker(pos, { icon: icon }).addTo(map);
    } else {
      marker.setLatLng(pos);
      marker.setIcon(icon);
    }
    if (!hasCentered) { map.setView(pos, 15); hasCentered = true; }

    var when = d.updated_at ? ago(d.updated_at) : "";
    var verb = d.moving === 1 ? "on the move" : "serving now";
    setStatus("Penny is out, " + verb + (when ? " · updated " + when : ""), true);
  }

  refresh();
  setInterval(refresh, 30000);
</script>
</body>
</html>
